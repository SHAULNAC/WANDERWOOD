<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WanderWood Catalog</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fcfaf7;
            --ink: #2f2218;
            --wood: #8b5e3c;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            background: var(--bg);
            color: var(--ink);
            font-family: 'Assistant', sans-serif;
        }

        .cover-page,
        .catalog-page {
            width: 210mm;
            min-height: 297mm;
            margin: 0 auto;
            background: var(--bg);
            position: relative;
            overflow: hidden;
        }

        .cover-page {
            page-break-after: always;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 10px;
        }

        .cover-page img {
            width: 34mm;
            height: 34mm;
            object-fit: contain;
        }

        .cover-page h1 {
            margin: 0;
            font-size: 56px;
            font-family: 'Playfair Display', serif;
        }

        .cover-page h2 {
            margin: 0;
            font-size: 24px;
            color: var(--wood);
            letter-spacing: 1px;
            font-family: 'Playfair Display', serif;
        }

        .cover-date {
            margin-top: 8px;
            font-size: 15px;
        }

        .catalog-page {
            page-break-after: always;
            display: grid;
            grid-template-rows: 1fr 1fr;
            gap: 8mm;
            padding: 10mm 10mm 16mm;
        }

        .page-footer {
            position: absolute;
            left: 10mm;
            right: 10mm;
            bottom: 6mm;
            border-top: 1px solid rgba(47, 34, 24, 0.22);
            padding-top: 2.5mm;
            font-size: 11px;
            text-align: center;
            color: #6b4e38;
        }

        .catalog-product {
            border: 1px solid #ebdece;
            border-radius: 12px;
            background: #fffdfb;
            padding: 5mm;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            min-height: 128mm;
            page-break-inside: avoid;
        }

        .catalog-text-block {
            border: 1px solid #f0e6da;
            border-radius: 8px;
            padding: 3.5mm;
            margin-bottom: 4mm;
            background: #fff;
        }

        .catalog-title {
            margin: 0;
            font-size: 25px;
            line-height: 1.2;
            font-family: 'Playfair Display', serif;
            color: #312317;
        }

        .catalog-price {
            margin: 1.5mm 0;
            font-size: 20px;
            color: var(--wood);
            font-weight: 700;
            font-family: 'Playfair Display', serif;
        }

        .catalog-description {
            margin: 0;
            font-size: 13px;
            line-height: 1.65;
            color: #4d3b2d;
        }

        .masonry-collage {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            justify-items: center;
            gap: 2mm;
            padding: 1mm 0;
        }

        .masonry-column {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2mm;
            width: 100%;
        }

        .center-column {
            justify-content: center;
            min-width: 54mm;
        }

        .side-column {
            justify-content: center;
        }

        .masonry-image-wrap {
            margin: 0;
            padding: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .masonry-image {
            display: block;
            width: auto;
            height: auto;
            max-width: 58mm;
            max-height: 58mm;
            object-fit: contain;
            filter: drop-shadow(0 1.2mm 1.6mm rgba(33, 20, 12, 0.14));
            border-radius: 1.5mm;
        }

        .center-column .masonry-image {
            max-width: 62mm;
            max-height: 68mm;
        }

        .empty-slot {
            opacity: 0;
        }

        @page { size: A4; margin: 0; }
    </style>
</head>
<body>
    <section class="cover-page">
        <img src="favicon.png" alt="WanderWood Logo">
        <h1>WanderWood</h1>
        <h2>CATALOG</h2>
        <div class="cover-date">__DATE__</div>
        <div class="page-footer">טלפון: __CONTACT_PHONE__ | אימייל: __CONTACT_EMAIL__ | אתר: __WEBSITE__</div>
    </section>

    __PAGES__
</body>
</html>
