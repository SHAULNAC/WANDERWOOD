<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WanderWood Catalog</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fdfcfb; /* קרם בהיר מאוד */
            --ink: #2f2218;
            --wood: #8b5e3c;
            --soft-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            background: var(--bg);
            color: var(--ink);
            font-family: 'Assistant', sans-serif;
            -webkit-print-color-adjust: exact;
        }

        /* עמוד שער יוקרתי */
        .cover-page {
            width: 210mm;
            height: 297mm;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #ffffff 0%, #f7f3ef 100%);
            page-break-after: always;
        }

        .cover-page img {
            width: 45mm;
            margin-bottom: 20px;
            filter: sepia(0.2);
        }

        .cover-page h1 {
            margin: 0;
            font-size: 72px;
            font-family: 'Playfair Display', serif;
            font-weight: 600;
            letter-spacing: -1px;
        }

        .cover-page h2 {
            margin: 10px 0;
            font-size: 20px;
            color: var(--wood);
            text-transform: uppercase;
            letter-spacing: 5px;
            font-weight: 300;
        }

        /* מבנה עמוד קטלוג */
        .catalog-page {
            width: 210mm;
            min-height: 297mm;
            margin: 0 auto;
            padding: 20mm 15mm;
            display: flex;
            flex-direction: column;
            gap: 25mm;
            page-break-after: always;
            position: relative;
        }

        .catalog-product {
            display: flex;
            flex-direction: column;
            gap: 12mm;
            page-break-inside: avoid;
        }

        /* בלוק טקסט נקי */
        .catalog-text-block {
            text-align: center;
            max-width: 80%;
            margin: 0 auto;
        }

        .catalog-title {
            margin: 0;
            font-size: 32px;
            font-family: 'Playfair Display', serif;
            font-style: italic;
            color: var(--ink);
        }

        .catalog-price {
            margin: 8px 0;
            font-size: 18px;
            color: var(--wood);
            font-weight: 600;
            letter-spacing: 1px;
        }

        .catalog-description {
            font-size: 14px;
            line-height: 1.8;
            color: #5a4a3c;
            font-weight: 300;
        }

        /* קולאז' אורגני */
        .organic-collage {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            height: 85mm;
            position: relative;
        }

        .collage-img-wrap {
            position: relative;
            transition: transform 0.3s;
        }

        .collage-img {
            display: block;
            max-height: 75mm;
            max-width: 90mm;
            border-radius: 4px;
            box-shadow: var(--soft-shadow);
            object-fit: contain;
            background: #fff;
            padding: 4px; /* מסגרת לבנה דקה כמו תמונה מודפסת */
        }

        /* הטיה קלה לתמונות ליצירת מראה ידני */
        .collage-img-wrap:nth-child(odd) { transform: rotate(-1.5deg); }
        .collage-img-wrap:nth-child(even) { transform: rotate(1.5deg) translateY(-10px); }
        
        /* תמונה מרכזית בולטת */
        .collage-img-wrap.featured {
            z-index: 10;
            transform: rotate(0deg) scale(1.1);
        }

        .page-footer {
            position: absolute;
            bottom: 10mm;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 10px;
            color: #b5a496;
            letter-spacing: 1px;
        }

        @page { size: A4; margin: 0; }
    </style>
</head>
<body>
    <section class="cover-page">
        <img src="favicon.png" alt="WanderWood Logo">
        <h1>WanderWood</h1>
        <h2>Portfolio</h2>
        <div style="margin-top: 40px; font-style: italic; color: #8b5e3c;">__DATE__</div>
    </section>

    __PAGES__

    <div class="page-footer">
        WANDERWOOD STUDIO  |  __CONTACT_PHONE__  |  __CONTACT_EMAIL__
    </div>
</body>
</html>
